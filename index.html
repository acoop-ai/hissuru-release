<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<!-- 多層防御(第零条実践規範§7-4): 出口封鎖CSP。connect/imgを自ドメイン＋Google認証系だけに限定し、
     万一XSSが通っても盗んだデータを外部へ送れない状態を作る。script/frameはGoogleログインを壊さぬよう寛容に。 -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https://accounts.google.com https://apis.google.com; script-src 'self' 'unsafe-inline' https://accounts.google.com https://apis.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://www.googleapis.com https://accounts.google.com; frame-src https://accounts.google.com; object-src 'none'; base-uri 'self'; form-action 'self' https://accounts.google.com">
<title>ヒッスル（PDCA）</title>

<style>
  /* 前回開発機（acoop-platform /pdca・c-section-table.tsx）の見た目を踏襲 */
  :root{
    --border:#e2e8f0; --muted:#64748b; --fg:#0f172a; --card:#fff; --bg-muted:#f1f5f9;
    --sky50:#f0f9ff; --sky100:#e0f2fe; --sky700:#0369a1; --sky800:#075985;
    --emer100:#dcfce7; --emer800:#166534; --violet100:#ede9fe; --violet800:#5b21b6;
    --good:#1565c0; --bad:#c62828; --amber:#b45309;
    --total-dark:#263238; --subtotal:#f1f5f9;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Segoe UI","Hiragino Sans","Yu Gothic UI",sans-serif;color:var(--fg);background:#fff;}
  header{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:40;}
  header .logo{background:#0f172a;color:#fff;font-weight:700;font-size:12px;border-radius:6px;padding:5px 7px;}
  header h1{font-size:15px;margin:0;} header .sub{font-size:11px;color:var(--muted);}
  header .user{margin-left:auto;font-size:11px;color:var(--muted);}
  .page{transition:background-color .3s;min-height:calc(100vh - 55px);}
  main{max-width:1400px;margin:0 auto;padding:20px 16px 40px;}
  h2.title{font-size:20px;font-weight:600;margin:0;} .subtitle{font-size:13px;color:var(--muted);margin:2px 0 0;}
  .btn{border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-size:13px;padding:6px 12px;color:#334155;}
  .btn.primary{background:#0284c7;border-color:#0284c7;color:#fff;font-weight:600;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  select{font-size:13px;padding:5px 7px;border:1px solid var(--border);border-radius:6px;background:#fff;}
  label.lb{font-size:11px;color:var(--muted);}

  /* 入室ゲート */
  .gate-wrap{display:flex;min-height:70vh;align-items:center;justify-content:center;padding:16px;}
  .card{width:100%;max-width:640px;border:1px solid var(--border);border-radius:14px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .card .chead{padding:20px 20px 6px;text-align:center;}
  .card .cico{margin:0 auto 6px;width:40px;height:40px;border-radius:999px;background:var(--sky100);display:flex;align-items:center;justify-content:center;color:var(--sky700);font-size:20px;}
  .card h3{font-size:18px;margin:4px 0;} .card .cdesc{font-size:13px;color:var(--muted);}
  .card .cbody{padding:8px 20px 20px;}
  .roles{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 0;}
  .role{border:1px solid var(--border);border-radius:10px;padding:12px;text-align:left;cursor:pointer;background:#fff;transition:.15s;}
  .role:hover{background:#f8fafc;} .role.on{border-color:#0ea5e9;background:var(--sky50);box-shadow:0 0 0 1px #0ea5e9 inset;}
  .role .rt{display:flex;align-items:center;gap:6px;font-weight:600;font-size:14px;}
  .role .rd{margin:6px 0 0;font-size:11px;line-height:1.4;color:var(--muted);}
  .gate-selects{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:10px 0;}
  .warn{color:var(--amber);font-size:12px;text-align:center;} .hint{color:var(--muted);font-size:12px;text-align:center;}

  /* 入室後バー */
  .asgbar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;background:#fff;border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:13px;}
  .asgbar .role-badge{border-radius:6px;padding:2px 8px;font-weight:600;}
  .rb-buyer{background:var(--sky100);color:var(--sky800);} .rb-admin{background:#fef3c7;color:#92400e;} .rb-viewer{background:#f1f5f9;color:#475569;}

  /* モードタブ */
  .modes{display:flex;flex-wrap:wrap;align-items:center;gap:4px;margin:18px 0 0;}
  .modes button{border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-size:13px;padding:6px 11px;color:#334155;}
  .modes button.on{background:#0284c7;border-color:#0284c7;color:#fff;font-weight:600;}
  /* 管理者用（データ管理）は閲覧系タブと明確に別物と分かるよう、右端へ隔離＋琥珀色の枠 */
  .modes .admin-sep{margin-left:auto;display:flex;align-items:center;gap:6px;padding-left:14px;border-left:2px dashed #e2e8f0;}
  .modes .admin-sep .lbl{font-size:10px;color:#b45309;font-weight:700;letter-spacing:.04em;white-space:nowrap;}
  .modes button.admin{border:1px solid #f59e0b;background:#fffbeb;color:#92400e;font-weight:700;}
  .modes button.admin:hover{background:#fef3c7;}
  .modes button.admin.on{background:#b45309;border-color:#b45309;color:#fff;}

  /* 選択バー・タブ */
  .selbar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin:14px 0;}
  .tabs2{display:flex;flex-wrap:wrap;gap:3px;margin:10px 0;}
  .tabs2 button{border:1px solid var(--border);border-radius:7px;background:#fff;cursor:pointer;font-size:12px;padding:4px 9px;color:#475569;}
  .tabs2 button.on{background:#0369a1;border-color:#0369a1;color:#fff;font-weight:600;}
  .chips{display:flex;flex-wrap:wrap;align-items:center;gap:6px;font-size:14px;margin:10px 0;}
  .chip{border-radius:6px;padding:2px 8px;font-weight:700;}
  .chip.a{background:var(--sky100);color:var(--sky800);} .chip.d{background:var(--emer100);color:var(--emer800);} .chip.s{background:var(--violet100);color:var(--violet800);}
  .legend{display:flex;flex-wrap:wrap;gap:14px;font-size:11px;color:var(--muted);margin:8px 0;align-items:center;}
  .legend .sw{display:inline-block;width:9px;height:9px;border-radius:2px;vertical-align:middle;margin-right:3px;}
  .sokuho{display:flex;gap:8px;border-left:4px solid #f59e0b;background:#fffbeb;color:#78350f;padding:10px 14px;border-radius:8px;font-size:13px;margin:8px 0;}
  .note{font-size:13px;color:var(--muted);background:#fff;border:1px dashed var(--border);border-radius:10px;padding:14px;}
  .err{color:var(--bad);font-size:13px;padding:12px;}

  /* C表 */
  .tbl-wrap{max-height:70vh;overflow:auto;border:1px solid var(--border);border-radius:10px;background:#fff;}
  table.c{width:100%;border-collapse:collapse;font-size:12px;}
  table.c thead th{position:sticky;top:0;z-index:20;background:var(--bg-muted);color:var(--muted);font-weight:600;padding:6px 10px;text-align:right;border-left:1px solid var(--border);white-space:nowrap;}
  table.c thead th.h{text-align:left;left:0;z-index:30;} table.c thead th .u{font-size:10px;font-weight:400;color:#94a3b8;margin-left:2px;}
  table.c td{border-left:1px solid var(--border);border-top:1px solid var(--border);padding:2px 10px;vertical-align:top;text-align:right;}
  table.c td.h{text-align:left;font-weight:600;position:sticky;left:0;background:#fff;z-index:10;white-space:nowrap;}
  tr.total td{background:var(--total-dark);color:#fff;font-weight:700;border-top:2px solid #0f172a;}
  tr.total td.h{background:var(--total-dark);color:#fff;}
  tr.subtotal td{background:var(--subtotal);font-weight:600;} tr.subtotal td.h{background:var(--subtotal);}
  tr.datarow:hover td{background:#f8fafc;}
  .cell{display:flex;flex-direction:column;gap:1px;text-align:right;line-height:1.25;font-variant-numeric:tabular-nums;padding:3px 0;}
  .cell .act{font-weight:700;font-size:12px;background:rgba(224,242,254,.6);margin:0 -10px;padding:0 10px;}
  tr.total .cell .act{background:transparent;color:#fff;} .cell .prev{color:var(--muted);font-size:11px;}
  tr.total .cell .prev{color:#cbd5e1;}
  .cell .bud{color:var(--amber);font-size:11px;} tr.total .cell .bud{color:#fcd34d;}
  .g{color:var(--good);} .b{color:var(--bad);} .n{color:var(--muted);}
  tr.total .g{color:#7dd3fc;} tr.total .b{color:#fca5a5;}
  .badge{display:inline-block;border-radius:4px;padding:0 4px;font-size:10px;font-weight:500;margin-top:2px;}
  .bd-loss{background:#ffe4e6;color:#be123c;} .bd-inv{background:#ffedd5;color:#c2410c;}
  td.gp-neg{background:#fff7ed;} td.gp-loss{background:#fefce8;}
  .catcol{color:var(--muted);}
  input[type=number]{width:64px;font-size:13px;padding:4px 6px;border:1px solid var(--border);border-radius:6px;}

  /* コメントパネル（G2）・データ管理（G3） */
  .cmcard{border:1px solid var(--border);border-radius:12px;background:#fff;padding:12px 14px;margin-top:14px;}
  .cmhead{display:flex;gap:8px;align-items:baseline;margin-bottom:4px;flex-wrap:wrap;}
  .cmsechead{font-weight:600;font-size:13px;margin-bottom:6px;}
  .cmempty{color:var(--muted);font-size:12px;}
  /* 課題グリッド: 行=課題（①②…）× 列=A/P/D。済は行単位 */
  table.cmt{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px;}
  table.cmt th{background:var(--bg-muted);color:var(--muted);font-weight:600;padding:6px 8px;text-align:left;border:1px solid var(--border);}
  table.cmt td{border:1px solid var(--border);padding:6px 8px;vertical-align:top;background:#fff;}
  table.cmt td.cmmark{width:26px;text-align:center;}
  tr.cmresolved td{background:#f0fdf4;}
  .cmmark{font-size:13px;color:var(--sky700);padding-top:2px;}
  .cmtext{font-size:13px;white-space:pre-wrap;line-height:1.5;}
  .cmmeta{font-size:11px;color:var(--muted);margin-top:2px;}
  .cmbtns{display:flex;gap:4px;margin-top:2px;} .cmbtns .btn{padding:2px 8px;font-size:12px;}
  .cmadd{display:flex;gap:6px;align-items:center;margin-top:6px;flex-wrap:wrap;}
  .cmcell{width:100%;min-height:26px;border:none;background:transparent;font-family:inherit;font-size:13px;line-height:1.5;resize:none;padding:2px 3px;outline:none;box-sizing:border-box;display:block;}
  .cmcell:focus{background:#fff;box-shadow:0 0 0 2px #7dd3fc inset;border-radius:4px;}
  .badge.bd-ok{background:#dcfce7;color:#166534;}

  /* アップロード進捗（フリーズ誤認の防止）: 押下感・スピナー・進捗バー・処理中オーバーレイ */
  .btn:active:not(:disabled){transform:scale(.97);}
  .btn.busy{position:relative;color:transparent !important;}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.45);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px;margin-right:6px;}
  .spin.dark{border-color:rgba(2,132,199,.3);border-top-color:#0284c7;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .upbox{margin-top:10px;border:1px solid var(--border);border-radius:10px;padding:10px 12px;background:#f8fafc;}
  .upbox .uphead{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#0f172a;}
  .upbar{height:8px;border-radius:999px;background:#e2e8f0;overflow:hidden;margin-top:8px;}
  .upbar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,#0284c7,#38bdf8);transition:width .25s;}
  .uplist{margin-top:8px;font-size:12px;line-height:1.7;}
  .uprow{display:flex;align-items:center;gap:6px;}
  .uprow .st{width:18px;text-align:center;}
  .uprow.done{color:#166534;} .uprow.fail{color:#b91c1c;} .uprow.wait{color:#94a3b8;} .uprow.now{color:#0369a1;font-weight:600;}

  #freshBar{display:flex;align-items:flex-start;gap:10px;background:#fef2f2;border-bottom:2px solid #fecaca;color:#7f1d1d;padding:10px 16px;font-size:13px;line-height:1.6;}
  #freshBar.warn{background:#fffbeb;border-bottom-color:#fde68a;color:#78350f;}
  #freshBar b{font-weight:700;}
  #busyOverlay{position:fixed;inset:0;background:rgba(15,23,42,.35);display:flex;align-items:center;justify-content:center;z-index:200;}
  #busyOverlay .bcard{background:#fff;border-radius:14px;padding:20px 26px;box-shadow:0 10px 30px rgba(0,0,0,.2);text-align:center;min-width:260px;}
  #busyOverlay .bttl{font-weight:700;font-size:14px;margin-top:10px;color:#0f172a;}
  #busyOverlay .bsub{font-size:12px;color:var(--muted);margin-top:4px;}
  /* ご利用ガイド（ヘッダー右上から開く） */
  header .ghelp{margin-left:10px;padding:4px 10px;font-size:12px;white-space:nowrap;border-color:var(--sky700);color:var(--sky800);background:var(--sky50);font-weight:600;}
  header .ghelp:hover{background:var(--sky100);}
  #guide{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:80;display:flex;align-items:center;justify-content:center;padding:16px;}
  #guide .gcard{background:#fff;border-radius:14px;width:100%;max-width:880px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 12px 40px rgba(0,0,0,.28);}
  #guide .ghead{display:flex;align-items:center;gap:10px;padding:13px 18px;border-bottom:1px solid var(--border);}
  #guide .ghead h2{font-size:16px;margin:0;} #guide .ghead .gsub{font-size:11px;color:var(--muted);}
  #guide .gclose{margin-left:auto;}
  #guide .gbody{overflow:auto;padding:14px 20px 26px;}
  #guide h3{font-size:14px;margin:20px 0 6px;color:var(--sky800);border-left:4px solid var(--sky700);padding-left:8px;}
  #guide h3:first-child{margin-top:4px;}

  #guide ul{margin:4px 0 6px 20px;padding:0;}
  #guide .gnote{background:var(--sky50);border:1px solid var(--sky100);border-radius:8px;padding:9px 12px;font-size:12.5px;line-height:1.7;color:var(--sky800);margin:8px 0;}
  #guide .gwarn{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:9px 12px;font-size:12.5px;line-height:1.7;color:#92400e;margin:8px 0;}
  #guide .gadmin{display:inline-block;background:#fffbeb;border:1px solid #f59e0b;color:#92400e;font-size:10px;font-weight:700;border-radius:4px;padding:1px 6px;margin-left:6px;vertical-align:middle;}
  #guide table{border-collapse:collapse;width:100%;margin:8px 0;font-size:12.5px;}
  #guide th,#guide td{border:1px solid var(--border);padding:5px 9px;text-align:left;vertical-align:top;}
  #guide th{background:var(--bg-muted);white-space:nowrap;}
  #guide .gcell{display:inline-block;border:1px dashed var(--border);border-radius:6px;padding:6px 10px;background:#fff;line-height:1.5;}
  #guide .gcell .bud{color:var(--amber);font-size:11px;} #guide .gcell .act{font-weight:700;font-size:12px;}
  #guide .gcell .prev{color:var(--muted);font-size:11px;}
  #toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;font-size:13px;padding:8px 16px;border-radius:8px;opacity:0;transition:opacity .3s;z-index:99;pointer-events:none;}
  #toast.bad{background:#b91c1c;}
  /* 店舗閲覧者の「閲覧/印刷」用・独自印刷機能（4ドメインのスプシ直開き不可への対応）。
     画面のUIはそのまま、印刷時だけ操作系を隠し内容を紙向けに整える。 */
  #printTitle{display:none;}
  #printTitle .ptitle{font-size:16px;font-weight:700;color:#0f172a;}
  #printTitle .psub{font-size:11px;color:#334155;margin-top:2px;}
  @media print{
    header, h2.title, .subtitle, .selbar, .asgbar, .modes, #storetabs, #scope .chips, #vSheetBox, #busyOverlay, #guide, #toast, .btn{display:none !important;}
    .page-break{page-break-before:always;}
    #printTitle{display:block !important;margin:0 0 10px;padding-bottom:6px;border-bottom:2px solid #0f172a;}
    .page{background:#fff !important;min-height:auto !important;}
    main{padding:0 !important;max-width:none !important;}
    .cmcard{box-shadow:none !important;border:1px solid #94a3b8;break-inside:avoid;page-break-inside:avoid;margin-bottom:8px;}
    .tbl-wrap{overflow:visible !important;}
    table.c, table.cmt{width:100% !important;}
    body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    @page{size:A4 landscape;margin:10mm;}
  }
</style>

<script>
/* 起動エラー可視化＋該当ソース取得: エラー行の実物を画面に出す（同一オリジンの生HTMLをfetch）。 */
window.addEventListener("error", function(ev){
  var ln = ev.lineno || 0;
  var esc2 = function(s){ return String(s).replace(/[&<>]/g, function(c){ return c==="&"?"&amp;":c==="<"?"&lt;":"&gt;"; }); };
  var show = function(src){
    var a = document.getElementById("app");
    if (a) a.innerHTML = '<div class="err" style="white-space:pre-wrap;font-size:11px;line-height:1.5">起動エラー：' + esc2(ev.message||"不明") + '\n行' + ln + '\n--- 該当ソース（前後） ---\n' + src + '</div>';
  };
  try{
    fetch(location.href).then(function(r){ return r.text(); }).then(function(t){
      var lines = t.split("\n");
      var out = [];
      for (var i = Math.max(0, ln-4); i < Math.min(lines.length, ln+2); i++){ out.push((i+1) + ": " + esc2(lines[i])); }
      show(out.join("\n"));
    }).catch(function(e){ show("(ソース取得失敗: " + esc2(e.message) + ")"); });
  }catch(e){ show("(取得例外: " + esc2(e.message) + ")"); }
});
</script>

/* ── OAuth2 認証（スマレコ方式: アクセストークン＋silent更新＋端末保存） ── */
let currentAccessToken=null, accessTokenExpiry=0, oauthTokenClient=null, tokenRefreshTimer=null, authedEmail="";
const TOKEN_STORE_KEY = "hissuru_oauth_token_v1";
function persistAccessToken_(){ try{ if(currentAccessToken&&accessTokenExpiry) localStorage.setItem(TOKEN_STORE_KEY, JSON.stringify({t:currentAccessToken,e:accessTokenExpiry})); }catch(e){} }
function restoreAccessToken_(){ try{ const raw=localStorage.getItem(TOKEN_STORE_KEY); if(!raw) return false; const o=JSON.parse(raw); if(!o||!o.t||!o.e||Date.now()>o.e-60000) return false; currentAccessToken=o.t; accessTokenExpiry=o.e; scheduleAccessTokenRefresh_(Math.floor((o.e-Date.now())/1000)+30); return true; }catch(e){ return false; } }
function clearStoredToken_(){ try{ localStorage.removeItem(TOKEN_STORE_KEY); }catch(e){} }
function ensureOAuthTokenClient_(){
  if(oauthTokenClient) return;
  if(!(window.google && google.accounts && google.accounts.oauth2)) throw new Error("Googleログイン部品が読み込めていません。ページを再読み込みしてください");
  oauthTokenClient = google.accounts.oauth2.initTokenClient({ client_id: CONFIG.GOOGLE_CLIENT_ID, scope: "openid email profile", callback: ()=>{} });
}
function requestAccessTokenOnce_(opts){
  return new Promise((resolve,reject)=>{
    try{ ensureOAuthTokenClient_(); }catch(e){ return reject(e); }
    const silent = !!(opts && opts.silent);
    let settled=false, guard=null;
    if(silent) guard=setTimeout(()=>{ if(!settled){ settled=true; reject(new Error("silent token timeout")); } }, 10000);
    oauthTokenClient.callback = (resp)=>{
      if(settled) return; settled=true; if(guard) clearTimeout(guard);
      if(!resp || resp.error || !resp.access_token) return reject(new Error((resp&&(resp.error_description||resp.error))||"トークン取得失敗"));
      currentAccessToken = resp.access_token;
      const ei = Number(resp.expires_in)||3600;
      accessTokenExpiry = Date.now() + (ei-30)*1000;
      persistAccessToken_(); scheduleAccessTokenRefresh_(ei);
      resolve(resp);
    };
    try{ const req={}; if(silent) req.prompt=""; oauthTokenClient.requestAccessToken(req); }
    catch(e){ if(!settled){ settled=true; if(guard) clearTimeout(guard); reject(e); } }
  });
}
function scheduleAccessTokenRefresh_(expiresInSec){
  if(tokenRefreshTimer) clearTimeout(tokenRefreshTimer);
  const after = Math.min(Math.max((expiresInSec-300)*1000, 5000), 55*60*1000);
  tokenRefreshTimer = setTimeout(()=>{ requestAccessTokenOnce_({silent:true}).catch(()=>{}); }, after);
}
async function fetchUserInfo_(){
  if(!currentAccessToken) throw new Error("未ログイン");
  const res = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", { headers:{ Authorization: "Bearer "+currentAccessToken } });
  if(!res.ok) throw new Error("userinfo HTTP "+res.status);
  return res.json();
}

/* ── GAS API 呼び出し（POST text/plain＝プリフライト回避・毎回トークン添付・期限切れは自動再取得） ── */
async function gsCall(fn, ...args){
  const noToken = !currentAccessToken, near = accessTokenExpiry && Date.now() > accessTokenExpiry - 60000;
  if(noToken || near){ try{ await requestAccessTokenOnce_({silent:true}); }catch(e){} }
  if(!currentAccessToken){ renderLogin_("セッションの有効期限が切れました。再度ログインしてください。"); throw new Error("セッション切れです"); }
  const res = await fetch(CONFIG.GAS_URL, { method:"POST", headers:{ "Content-Type":"text/plain;charset=UTF-8" }, body: JSON.stringify({ action:fn, args:args, accessToken: currentAccessToken }), redirect:"follow" });
  if(!res.ok) throw new Error("HTTP "+res.status);
  const json = await res.json();
  if(json && json.error){
    if(String(json.error).indexOf("認証失敗")>=0){ currentAccessToken=null; accessTokenExpiry=0; clearStoredToken_(); }
    throw new Error(json.error);
  }
  return json.result;
}

const kyen=v=>Math.round((v||0)/1000).toLocaleString();
const dkyen=v=>{const x=Math.round((v||0)/1000);return (x>=0?"+":"")+x.toLocaleString();};
const pct=v=>v==null?"\u2014":v.toFixed(2)+"%";
const ppt=v=>(v>=0?"+":"")+v.toFixed(2)+"pt";
const ratio=(c,b)=>!b?"\u2014":(c/b*100).toFixed(1)+"%";
function judge(hib,diff){ if(Math.abs(diff)<1e-9) return "n"; const good=(hib!==false)?diff>0:diff<0; return good?"g":"b"; }

/* 縦積みセル（金額=計/実績/前/計比/前比、率=実績/前/前差/計差） */
/* セルは全列とも「計 → 実績 → 前年 → 計画差 → 前年差」の5段固定。
   計画が無い列は空欄を置いて段数を揃える（列をまたいで実績が必ず同じ行に来るように）。 */
function cellHtml(cell,col,dark){
  if(!cell||cell.current==null) return `<div class="cell n">—</div>`;
  const hib=col.higher_is_better, cur=cell.current, yoy=cell.yoy, bud=cell.budget;
  const isRate=(col.type==="rate");
  const hasB=(bud!=null && bud!==0);
  const yDiff=cur-(yoy||0), pDiff=hasB?cur-bud:0;
  const fmt=v=>isRate?pct(v):kyen(v);
  let h=`<div class="cell">`;
  // ①計画
  h+= hasB ? `<div class="bud">計 ${fmt(bud)}</div>` : `<div class="bud">&nbsp;</div>`;
  // ②実績（この行が全列で揃う）
  h+=`<div class="act">${fmt(cur)}</div>`;
  // ③前年
  h+=`<div class="prev">前 ${fmt(yoy)}</div>`;
  // ④計画との差（上）
  h+= hasB
    ? `<div class="${judge(hib,pDiff)}">${isRate?`計差 ${ppt(pDiff)}`:`計比 ${ratio(cur,bud)} <span style="opacity:.8">${dkyen(pDiff)}</span>`}</div>`
    : `<div class="n">&nbsp;</div>`;
  // ⑤前年との差（下）
  h+=`<div class="${judge(hib,yDiff)}">${isRate?`前差 ${ppt(yDiff)}`:`前比 ${ratio(cur,yoy)} <span style="opacity:.8">${dkyen(yDiff)}</span>`}</div>`;
  return h+`</div>`;
}

/* ── 表示データの鮮度チェック ──
   outbox(meta.json) の最終更新が古い＝HQ側の同期/取込が止まっている可能性。
   2026-07-18 に同期が4日間停止し、ユーザーが「アップロードしたのに反映されない」と気づけなかった事故を受けて追加。 */
/* 判定と描画（純粋関数・単体で検証可能）: 24時間以上古ければバーを出す。3日以上は赤 */
function renderFreshBar_(metaUpdated){
  const old=$("freshBar"); if(old) old.remove();
  if(!metaUpdated) return false;
  const t=new Date(String(metaUpdated).replace(/-/g,"/"));   // "yyyy-MM-dd HH:mm:ss"
  if(isNaN(t)) return false;
  const hours=(Date.now()-t.getTime())/36e5;
  if(hours<24) return false;                // 1日以内は正常（通常は5分毎に更新される）
  const days=Math.floor(hours/24);
  const bar=document.createElement("div");
  bar.id="freshBar"; bar.className = hours>=72 ? "" : "warn";   // 3日以上は赤・それ未満は黄
  bar.innerHTML=`<span>${hours>=72?"🔴":"⚠️"}</span><span><b>表示中のデータは ${esc(metaUpdated)} 時点のものです（約${days}日前）。</b>`+
    `本部側のデータ更新が停止している可能性があります。新しくアップロードした受払CSV・予算はまだ反映されていません。`+
    `<br>お手数ですが、この表示が続く場合は本部（システム担当）へご連絡ください。</span>`;
  const page=$("page");
  if(page && page.parentNode) page.parentNode.insertBefore(bar, page);
  return true;
}
async function checkFreshness_(){
  if(!IS_GAS) return;                       // ローカルはミラーなので判定しない
  try{ const f=await capi("getDataFreshness"); renderFreshBar_(f && f.metaUpdated); }
  catch(e){ /* 鮮度が取れなくても本体の利用は妨げない */ }
}

async function doLogin_(){
  const err=$("loginErr");
  const showErr=t=>{ if(err){ err.textContent=t; err.style.display="block"; } };
  try{
    await requestAccessTokenOnce_({});
    const u=await fetchUserInfo_();
    const d=String(u.email||"").split("@")[1]||"";
    if(!CONFIG.ALLOWED_DOMAINS.includes(d)){
      currentAccessToken=null; accessTokenExpiry=0; clearStoredToken_();
      showErr("社内ドメインのアカウントでログインしてください（個人Gmailは不可）。");
      return;
    }
    authedEmail=u.email; $("user").textContent=u.email;
    startApp_();
  }catch(e){ showErr("ログインできませんでした: "+String(e&&e.message||e)); }
}

/* ログイン後（ローカルは直接ここ）: データ読込→入口表示 */
async function startApp_(){
  // 起動見張り: 12秒たっても起動が終わらなければ、どの段階で止まったかを表示
  let booted=false; window.__bootStep="起動";
  setTimeout(()=>{ if(!booted){ const a=$("app"); if(a) a.innerHTML=`<div class="err">起動に時間がかかっています（「${esc(window.__bootStep)}」で停止中）。<br>通信状況をご確認のうえ、再読み込みしてください。</div>`; } }, 12000);
  $("app").innerHTML=`<div class="note">読み込み中…</div>`;
  capi("getCommentsSheetUrl").then(u=>{S.sheetUrl=u||"";}).catch(()=>{S.sheetUrl="";});
  try{
    window.__bootStep="データ(meta)取得";
    S.meta=await Promise.race([ API.meta(),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error("データ取得が返りません（サーバーAPIの応答なし）。時間をおいて再読み込みしてください。")),15000)) ]);
    if(S.meta.slugs){SLUG.area=S.meta.slugs.areas||{};SLUG.dept=S.meta.slugs.departments||{};}
    // 既定エリア＝データのある北関東（無ければ先頭）
    S.area=(S.meta.areas.includes("北関東")?"北関東":S.meta.areas[0])||"";
    S.dept=S.meta.departments[0]||"";
    S.ym=S.meta.year_months[0]||"";
    window.__bootStep="モード判定";
    S.viewMode=detectMode();
    booted=true;
    if(S.viewMode==="viewer") renderViewerGate(); else renderGate();
    checkFreshness_();   // 表示データの鮮度を確認（HQ側の同期停止に気づけるように・非同期で邪魔しない）
  }catch(e){ booted=true; $("app").innerHTML=`<div class="err">初期化エラー：${esc(e.message||e)}</div>`; }
}

/* ── 前回の担当を利用者ごとに記憶（毎回の選び直しを軽減）。キーはログイン中のメール単位 ── */
function prefKey_(){ return "hissuru_pref_" + (authedEmail || "local"); }
function savePref_(o){ try{ localStorage.setItem(prefKey_(), JSON.stringify(Object.assign(loadPref_(), o))); }catch(e){} }
function loadPref_(){ try{ return JSON.parse(localStorage.getItem(prefKey_())||"{}")||{}; }catch(e){ return {}; } }
/* 保存済みの担当を既定値として S へ反映（存在するものだけ・入室ボタンは毎回押す＝無記名防止は維持） */
function applyPref_(){
  const p=loadPref_();
  if(p.role && ROLES.some(r=>r.k===p.role)) S.role=p.role;
  if(p.area && S.meta.areas.includes(p.area)) S.area=p.area;
  if(p.dept && S.meta.departments.includes(p.dept)) S.dept=p.dept;
  return p;
}

  const needDept=(S.mode==="商品部詳細"||S.mode==="商品部全体"||S.mode==="仕入分析"||S.mode==="運営部詳細");
  const deptSel=needDept?`<span class="lb">部門</span><select onchange="onDept(this.value)">`+S.meta.departments.map(d=>`<option value="${esc(d)}" ${d===S.dept?'selected':''}>${esc(d)}</option>`).join("")+`</select>`:"";
  v.innerHTML=`<div class="selbar"><span class="lb">エリア</span>${areaSel}<span class="lb">年月</span>${ymSel}<span class="lb">データ期間</span><select id="snapSel" onchange="onSnap(this.value)"></select>${deptSel}<button class="btn" style="margin-left:auto" onclick="printHq_()" title="表示中のモード（この画面）を印刷します">🖨 印刷</button></div>`+
    `<div id="storetabs"></div><div id="scope"></div><div id="body"><div class="note">読み込み中\u2026</div></div>`;

async function loadSnaps(){

/* 店舗別カテゴリ明細: HQ配信は部門\u00D7店舗の粒度（c/shohin_detail__{area}__{dept}__{ym}__{snap8}__{storeSlug}.json）。

const isNoFile=e=>{const m=String(e&&e.message||e);return m.includes("ファイルなし")||m.includes("未収載");};
async function storeDetailHtml(slug,so,dept){

/* \u2500\u2500 G2: PDCA コメント（正本=Google Sheets・下書き/確定の2段階なし=即時保存・済はA行のみ） \u2500\u2500 */
const SECTIONS=[{k:"A",icon:"\u2705",label:"A：改善アクション"},{k:"P",icon:"\uD83D\uDCCB",label:"P：計画"},{k:"D",icon:"\uD83C\uDFAF",label:"D：実行（結果）"}];
const MARKS=["\u2460","\u2461","\u2462","\u2463","\u2464","\u2465","\u2466","\u2467","\u2468","\u2469","\u246A","\u246B","\u246C","\u246D","\u246E"];
let CM={A:[],P:[],D:[]}, cmSeq=0, saveQ=Promise.resolve();

/* GAS 関数呼び出し（ローカル開発は localStorage モック） */
async function capi(fn,...args){ if(IS_GAS) return gsCall(fn,...args); return mockApi(fn,args); }
function mockRows(){ try{return JSON.parse(localStorage.getItem("mock_comments")||"[]");}catch(e){return [];} }
function mockSave(r){ localStorage.setItem("mock_comments",JSON.stringify(r)); }
function mockApi(fn,args){
  if(fn==="getComments"){ const [ym,sn,area,store,dept]=args; const out={A:[],P:[],D:[]};
    mockRows().forEach(r=>{ if(String(r.year_month)===String(ym)&&String(r.snapshot8)===String(sn)&&r.area===area&&r.store===store&&r.dept===dept&&out[r.section]) out[r.section].push(r); });
    return Promise.resolve(out); }
  if(fn==="upsertComment"){ const [key,sec,id,text,resolved]=args; const rows=mockRows();
    const now=new Date().toISOString().slice(0,19).replace("T"," ");
    const ex=rows.find(r=>r.item_id===id);
    if(ex){ ex.text=text; ex.resolved=!!resolved; ex.resolved_at=resolved?(ex.resolved_at||now):""; ex.updated_at=now; }
    else rows.push({year_month:key.ym,snapshot8:key.snap8,area:key.area,store:key.store,dept:key.dept,section:sec,
      item_id:id,text:text,resolved:!!resolved,resolved_at:resolved?now:"",author:"ローカル開発",updated_at:now,source:"mock"});
    mockSave(rows); return Promise.resolve({item_id:id}); }
  if(fn==="deleteComment"){ mockSave(mockRows().filter(r=>r.item_id!==args[0])); return Promise.resolve({deleted:true}); }
  if(fn==="uploadInbox") return Promise.resolve({ok:true,name:args[1],by:"ローカル開発",at:"(モック)"});
  if(fn==="getCommentsSheetUrl") return Promise.resolve("");  // ローカルは正本Sheetへのリンクなし（実IDは公開しない）
  if(fn==="buildPdcaSheet"){ window.__lastSpec=args[0]; return Promise.resolve({url:"https://docs.google.com/spreadsheets/d/MOCK_"+encodeURIComponent(args[0].fileName)+"/edit",id:"mock"}); }
  return Promise.reject(new Error("mock未対応: "+fn));
}

/* 権限（入室担当 asg \u00D7 現在の表示スコープ） */
function canEditSec(sec){
  const a=S.asg; if(!a||a.role==="viewer"||!S.snap) return false;
  if(a.area!==S.area) return false;
  if(a.role!=="admin"&&a.dept!==S.dept) return false;
  if(S.mode==="運営部詳細") return sec==="D"&&S.storeTab==="__total__"; // 運営部=Dのみ・店舗タブは全閲覧（C7）
  if(S.mode==="商品部詳細") return true; // A/P/D すべて（エリア合計・店舗とも）
  return false;
}
function canResolveRow(){
  const a=S.asg; if(!a||a.role==="viewer") return false;
  return a.area===S.area&&(a.role==="admin"||a.dept===S.dept);
}
function cKey(){
  const store=S.storeTab!=="__total__"?((S.stores.find(x=>x.slug===S.storeTab)||{}).full||""):"";
  return {ym:S.ym,snap8:s8(S.snap),area:S.area,store:store,dept:S.dept};
}

async function renderComments(){
  const el=$("cpanel"); if(!el) return;
  if(!S.snap){ el.innerHTML=""; return; }
  try{ const k=cKey(); CM=await capi("getComments",k.ym,k.snap8,k.area,k.store,k.dept); }
  catch(e){ const m=String(e&&e.message||e);
    el.innerHTML=m.includes("COMMENTS_SHEET_ID")
      ? `<div class="note">コメント機能は初期化前です（管理者が GAS エディタで <b>setupCommentSheet</b> を実行すると有効になります）。</div>`
      : `<div class="err">コメントを取得できません：${esc(m)}</div>`;
    return; }
  drawComments();
}
/* 行=課題（\u2460\u2461\u2026）\u00D7 列=A/P/D（オリジナル踏襲）。セル直接入力\u2192自動保存（スプシ同然）。済は行＝課題単位（Aのresolvedが正）。
   タイピング中はDOMを再構築しない（フォーカス保持）。保存は saveQ で直列化（サーバー側ロック渋滞の防止）。 */
function drawComments(){
  const el=$("cpanel"); if(!el) return;
  const so=S.storeTab!=="__total__"?S.stores.find(x=>x.slug===S.storeTab):null;
  const scope=`${S.area} / ${S.dept}${so?" / "+so.short:" / エリア合計"}`;
  const sel=S.snaps.find(x=>x.snapshot===S.snap);
  const anyEdit=SECTIONS.some(s=>canEditSec(s.k));
  let h=`<div class="cmcard"><div class="cmhead"><b>PDCA アクション</b><span class="lb">${esc(scope)}・${esc(sel?sel.label:"")}${IS_GAS?"":"（ローカル＝保存はこの端末のみ）"}</span><span class="lb" id="cmsave"></span>`+
    (S.sheetUrl?`<a href="${esc(safeUrl_(S.sheetUrl))}" target="_blank" rel="noopener" class="btn" style="margin-left:auto;text-decoration:none;padding:3px 10px;font-size:12px">\uD83D\uDCC4 スプレッドシートで開く</a>`:"")+`</div>`;
  h+=`<table class="cmt"><thead><tr><th style="width:26px">#</th>`;
  SECTIONS.forEach(s=>{
    h+=`<th style="width:31%">${s.icon} ${esc(s.label)}${canEditSec(s.k)?"":` <span class="badge" style="background:#e2e8f0;color:#475569">閲覧のみ</span>`}</th>`;
  });
  h+=`<th style="width:76px">済</th></tr></thead><tbody id="cmtb">`;
  const n=cmRowCount();
  for(let i=0;i<n;i++) h+=cmRow(i);
  if(!n) h+=`<tr><td></td><td colspan="3" class="cmempty">（記入なし）</td><td></td></tr>`;
  h+=`</tbody></table>`;
  if(anyEdit) h+=`<div class="lb" style="margin-top:6px">セルに直接入力すると自動保存されます。「\u2713済」は行（課題）単位の完了記録です。</div>`;
  el.innerHTML=h+`</div>`;
}
function cmRowCount(){
  const n=Math.max(CM.A.length,CM.P.length,CM.D.length);
  return n+(SECTIONS.some(s=>canEditSec(s.k))?1:0); // 編集可なら常に空きの次行を1つ出す
}
function cmRow(i){
  const a=CM.A[i], resolved=!!(a&&a.resolved);
  let h=`<tr id="cmr_${i}" class="${resolved?"cmresolved":""}"><td class="cmmark" id="cmmk_${i}">${cmMark(i)}</td>`;
  SECTIONS.forEach(s=>{ h+=`<td id="cmtd_${s.k}_${i}">${cmCellHtml(s.k,i)}</td>`; });
  return h+`<td style="text-align:center" id="cmrs_${i}">${cmResolveHtml(i)}</td></tr>`;
}
function cmMark(i){ return SECTIONS.some(s=>CM[s.k][i])?(MARKS[i]||String(i+1)):"＋"; }
function cmCellHtml(sec,i){
  const it=CM[sec][i], edit=canEditSec(sec);
  if(it){
    if(!edit) return `<div class="cmtext">${esc(it.text)}</div><div class="cmmeta">${esc(it.author||"")}${it.updated_at?"・"+esc(String(it.updated_at).slice(5,16)):""}</div>`;
    return `<textarea class="cmcell" data-sec="${sec}" data-id="${esc(it.item_id)}" oninput="cInput(this)" onblur="cBlur(this)">${esc(it.text)}</textarea>`+
      `<div class="cmmeta">${esc(it.author||"")}${it.updated_at?"・"+esc(String(it.updated_at).slice(5,16)):""}<button class="btn" style="float:right;padding:0 6px;font-size:11px" title="行を削除" onclick="cDel('${esc(it.item_id)}')">\uD83D\uDDD1</button></div>`;
  }
  // 各列とも「次の1マス」だけ新規入力セルを出す（\u2460が埋まれば\u2461\u2026の位置に揃う）
  if(edit&&CM[sec].length===i) return `<textarea class="cmcell" data-sec="${sec}" oninput="cInput(this)" onblur="cBlur(this)" placeholder="＋ 入力すると自動保存\u2026"></textarea>`;
  return "";
}
function cmResolveHtml(i){
  const a=CM.A[i]; if(!a) return "";
  const resolved=!!a.resolved; let x="";
  if(resolved) x+=`<div class="badge bd-ok">済 ${esc(String(a.resolved_at||"").slice(5,10))}</div><div style="height:3px"></div>`;
  if(canResolveRow()) x+=`<button class="btn" onclick="cResolve('${esc(a.item_id)}',${resolved?"false":"true"})">${resolved?"戻す":"\u2713 済"}</button>`;
  return x;
}
function cmIndicator(st,msg){ const e=$("cmsave"); if(!e) return; e.textContent=msg||""; e.style.color=st==="err"?"#b91c1c":st==="saving"?"#b45309":"#166534"; }
function newId(){ return "it_"+Date.now().toString(36)+"_"+(++cmSeq)+Math.random().toString(36).slice(2,6); }

function cInput(el){
  el.style.height="auto"; el.style.height=el.scrollHeight+"px";
  clearTimeout(el._t); el._t=setTimeout(()=>cFlush(el),700); // 手が止まって0.7秒で自動保存
}
function cBlur(el){ clearTimeout(el._t); cFlush(el); }
function cFlush(el){
  const sec=el.dataset.sec;
  if(!el.dataset.id){
    if(!el.value.trim()) return;
    const id=newId(); el.dataset.id=id;
    CM[sec].push({item_id:id,text:el.value,resolved:false,author:$("user").textContent||"",updated_at:""});
    cmAfterCreate(sec);
    enqueueSave(sec,id);
    return;
  }
  const it=CM[sec].find(x=>x.item_id===el.dataset.id); if(!it||it.text===el.value) return;
  it.text=el.value; enqueueSave(sec,el.dataset.id);
}
/* 新規行の確定: マーカー・済セルを更新し、次の空き行（無ければ追加）と当該列の次の入力マスを必ず用意する。
   行が既に在る場合もその行の当該列セルへ入力マスを差し込む（A以外の列で新規マスが増えないバグの修正）。
   タイピング中の既存セルは触らない */
function cmAfterCreate(sec){
  const i=CM[sec].length-1;
  const mk=$("cmmk_"+i); if(mk) mk.textContent=cmMark(i);
  const rs=$("cmrs_"+i); if(rs) rs.innerHTML=cmResolveHtml(i);
  const next=i+1;
  if(!$("cmr_"+next)&&$("cmtb")) $("cmtb").insertAdjacentHTML("beforeend",cmRow(next));
  const td=$("cmtd_"+sec+"_"+next);
  if(td&&!td.querySelector("textarea")) td.innerHTML=cmCellHtml(sec,next);
}
function enqueueSave(sec,id){
  cmIndicator("saving","保存中\u2026");
  const key=cKey(); // 保存時点のスコープを固定（後で画面を切り替えても正しい週キーへ書く）
  saveQ=saveQ.then(async()=>{
    const it=CM[sec].find(x=>x.item_id===id); if(!it) return;
    try{
      await capi("upsertComment",key,sec,id,it.text,!!it.resolved);
      cmIndicator("ok","\u2713 自動保存 "+new Date().toTimeString().slice(0,5));
    }catch(e){ cmIndicator("err","\u26A0 保存失敗（入力を続けると自動で再保存します）"); }
  });
}
async function cDel(id){
  if(!confirm("この行を削除しますか？")) return;
  let sec=null; SECTIONS.forEach(s=>{ if((CM[s.k]||[]).some(x=>x.item_id===id)) sec=s.k; });
  if(!sec) return;
  CM[sec]=CM[sec].filter(x=>x.item_id!==id);
  drawComments();
  saveQ=saveQ.then(async()=>{ try{ await capi("deleteComment",id); toast("削除しました"); }catch(e){ toast("削除に失敗: "+String(e&&e.message||e),true); renderComments(); } });
}
function cResolve(id,flag){
  const it=(CM.A||[]).find(x=>x.item_id===id); if(!it) return;
  it.resolved=flag; it.resolved_at=flag?new Date().toISOString().slice(0,19).replace("T"," "):"";
  const i=CM.A.indexOf(it);
  const tr=$("cmr_"+i); if(tr) tr.className=flag?"cmresolved":"";
  const rs=$("cmrs_"+i); if(rs) rs.innerHTML=cmResolveHtml(i);
  enqueueSave("A",id);
}
function toast(msg,bad){
  let t=$("toast"); if(!t){ t=document.createElement("div"); t.id="toast"; document.body.appendChild(t); }
  t.textContent=msg; t.className=bad?"bad":""; t.style.opacity=1;
  clearTimeout(t._h); t._h=setTimeout(()=>{ t.style.opacity=0; },2500);
}

function busyOverlay_(show, title, sub){
  let o=$("busyOverlay");
  if(!show){ if(o) o.remove(); return; }
  if(!o){ o=document.createElement("div"); o.id="busyOverlay"; document.body.appendChild(o); }
  o.innerHTML=`<div class="bcard"><span class="spin dark" style="width:26px;height:26px;border-width:3px;margin:0"></span>`+
    `<div class="bttl">${esc(title||"処理中です")}</div><div class="bsub">${esc(sub||"画面を閉じずにお待ちください")}</div></div>`;
}
function upProgress_(host, names, title){
  const rows=names.map((n,i)=>`<div class="uprow wait" id="up_${i}"><span class="st">…</span><span>${esc(n)}</span></div>`).join("");
  host.innerHTML=`<div class="upbox"><div class="uphead"><span class="spin dark"></span><span id="upTtl">${esc(title)}</span></div>`+
    `<div class="upbar"><i id="upBar"></i></div><div class="uplist">${rows}</div>`+
    `<div class="upnote">送信中です。完了までこのタブを閉じないでください。</div></div>`;
  const total=names.length;
  return {
    step(i, state, extra){
      const el=$("up_"+i); if(el){
        el.className="uprow "+state;
        el.querySelector(".st").textContent = state==="now"?"▶" : state==="done"?"✅" : state==="fail"?"❌" : "…";
        if(extra) el.innerHTML += ` <span style="opacity:.8">${esc(extra)}</span>`;
      }
      const doneCount=names.filter((_,k)=>{const e=$("up_"+k);return e&&(/done|fail/.test(e.className));}).length;
      const bar=$("upBar"); if(bar) bar.style.width=Math.round(doneCount/total*100)+"%";
      const t=$("upTtl"); if(t) t.textContent=`${title}（${doneCount}/${total}）`;
    },
    finish(okCount, failCount){
      const box=host.querySelector(".upbox"); if(!box) return;
      const sp=box.querySelector(".spin"); if(sp) sp.remove();
      const t=$("upTtl"); if(t) t.textContent = failCount? `完了（成功 ${okCount} / 失敗 ${failCount}）` : `完了（${okCount} 件すべて成功）`;
      const note=box.querySelector(".upnote");
      if(note) note.textContent = failCount ? "失敗した行は内容をご確認のうえ再度お試しください。" : "取込は5分毎の自動処理で行われます。上の「取込状況」でご確認ください。";
    }
  };
}
/* ボタンを送信中状態に（押下感＋二重送信防止） */
function btnBusy_(btn, on, label){
  if(!btn) return;
  if(on){ btn._label=btn.innerHTML; btn.disabled=true; btn.innerHTML=`<span class="spin"></span>${esc(label||"送信中…")}`; }
  else { btn.disabled=false; if(btn._label) btn.innerHTML=btn._label; }
}

async function dmUpUke(btn){
  if(UKEUP){ toast("アップロード処理中です。完了までお待ちください",true); return; }
  const fs=[...($("dmUke").files||[])];

/* \u2500\u2500 予算取込キュー: ファイル選択のたびに積み上げ、名前から年度・エリアを自動判定して
     「{年度}_{エリア}.xlsx」へ正規化。同一ファイル・同一 年度\u00D7エリア は自動排除。
     （ファイル取込UIの標準形＝積み上げ式・自動正規化・重複排除） \u2500\u2500 */
const _XLSX_MIME="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet";
const _BUD_AREAS=["北東北","北関東","首都圏","宮城","山形","東北"]; // 部分一致の優先順（「北東北」を「東北」より先に判定）
const _budLabel=a=>a==="東北"?"東北（北東北・宮城・山形 一括）":a;
let BQ=[]; // 積み上げキュー {f, key, year, area}
function budParse(name){
  const n=String(name).normalize("NFC");
  let area=""; for(const a of _BUD_AREAS){ if(n.includes(a)){ area=a; break; } }
  const y=n.match(/20\d{2}/);
  return { year: y?y[0]:"", area };
}
function budAdd(){
  const inp=$("dmBud");
  for(const f of inp.files){
    const key=f.name.normalize("NFC")+"|"+f.size;
    if(BQ.some(x=>x.key===key)) continue;
    BQ.push(Object.assign({f,key,name:f.name},budParse(f.name)));
  }
  inp.value=""; budRenderQ();
}
/* ドライブ選択ピッカー（xlsx・スプシのみ表示。選んだら同じ自動判定キューへ積む） */
let DP={stack:[],cur:null};
async function budPickOpen(rootId){

async function budPickLoad(){

}
function budPickRender(){

    ...d.files.map((f,i)=>`<div class="lb" style="margin-top:2px">${f.mime==="application/vnd.google-apps.spreadsheet"?"\uD83D\uDCD7":"\uD83D\uDCC4"} ${esc(f.name)} <button class="btn" onclick="budPickAdd(${i})">リストに追加</button></div>`)
  ].join("")||`<div class="lb">このフォルダに xlsx・スプレッドシートはありません</div>`;
  $("dmPick").innerHTML=`<div class="cmcard" style="margin-top:6px"><div class="lb">${bc} <button class="btn" style="float:right" onclick="$('dmPick').innerHTML=''">閉じる</button></div>${rows}${d.truncated?`<div class="lb">（多数のため先頭300件のみ表示）</div>`:""}</div>`;
}
function budPickInto(i){ const f=DP.cur.folders[i]; DP.stack.push({id:f.id,name:f.name}); budPickLoad(); }
function budPickAdd(i){
  const f=DP.cur.files[i]; const key="drive|"+f.id;
  if(BQ.some(x=>x.key===key)){ toast("すでにリストにあります",true); return; }
  BQ.push(Object.assign({driveId:f.id,key,name:f.name},budParse(f.name)));
  budRenderQ(); toast("リストに追加しました");
}
function budRenderQ(){
  const q=$("dmBudQ"); if(!BQ.length){ q.innerHTML=""; return; }
  const seen={};
  q.innerHTML=BQ.map((x,i)=>{
    const dest=(x.year&&x.area)?`${x.year}_${x.area}.xlsx`:"";
    const dup=!!(dest&&seen[dest]); if(dest&&!dup) seen[dest]=1;
    const yearIn=`<input type="number" value="${esc(x.year)}" style="width:74px" onchange="BQ[${i}].year=this.value;budRenderQ()">`;
    const areaSel=`<select onchange="BQ[${i}].area=this.value;budRenderQ()"><option value=""${x.area?"":" selected"}>エリア?</option>${_BUD_AREAS.map(a=>`<option value="${esc(a)}"${a===x.area?" selected":""}>${esc(_budLabel(a))}</option>`).join("")}</select>`;
    const state=dup?`<b style="color:#b8860b">重複（自動排除）</b>`
      :dest?`\u2192 <b>${esc(dest)}</b>${x.area==="東北"?"（3エリアへ自動分割）":""}`
      :`<b style="color:#c00">年度・エリアを判定できません\u2014\u2014選んでください</b>`;
    return `<div class="cmadd" style="margin-top:4px"><span class="lb">${x.driveId?"\u2601\uFE0F":"\uD83D\uDCC4"} ${esc(x.name)}</span> ${yearIn} ${areaSel} <span class="lb">${state}</span> <button class="btn" onclick="BQ.splice(${i},1);budRenderQ()">\u2715</button></div>`;
  }).join("");
}
let BUP=false; // 二重実行ガード（連打・処理中の再クリックを無効化）
async function dmUpBud(btn){
  if(BUP){ toast("アップロード処理中です。完了までお待ちください",true); return; }
  if(!BQ.length){ toast("ファイルを選択（またはドライブから追加）してください",true); return; }
  if(BQ.some(x=>!(x.year&&x.area))){ toast("年度・エリア未確定（赤）の行を修正してください",true); return; }
  const items=BQ.filter(x=>!x.done);
  btn=btn||$("dmBudBtn");
  BUP=true; btnBusy_(btn,true,"送信中…");
  busyOverlay_(true,"年度予算を送信中です",`0 / ${items.length} 件`);
  const pg=upProgress_($("dmBudMsg"), items.map(x=>x.name), "アップロード中");
  const seen={}; let ok=0, ng=0;
  try{
    for(let i=0;i<items.length;i++){
      const x=items[i];
      const dest=`${x.year}_${x.area}.xlsx`;
      if(seen[dest]){ x.done=true; pg.step(i,"done","（重複のため送信省略）"); continue; }
      seen[dest]=1;
      pg.step(i,"now");
      busyOverlay_(true,"年度予算を送信中です",`${i+1} / ${items.length} 件目：${dest}`);
      try{
        if(x.driveId) await capi("uploadInboxFromDrive",x.driveId,dest);
        else await capi("uploadInbox","budget",dest,await fileB64(x.f),_XLSX_MIME);
        ok++; x.done=true;
        pg.step(i,"done",`→ ${dest}${x.area==="東北"?"（3エリアへ自動分割）":""}`);
      }catch(e){ ng++; pg.step(i,"fail",String(e&&e.message||e)); }
    }
  } finally {
    BUP=false; btnBusy_(btn,false); busyOverlay_(false);
    pg.finish(ok,ng);
    BQ=BQ.filter(x=>!x.done); budRenderQ();
  }
  if(ok) toast(ok+" 件をアップロードしました（取込は5分毎の自動処理→上の「取込状況」で確認）");
}

  const restored=!!(p.area||p.dept||p.storeSlug);
  const areaSel=`<select id="vArea" onchange="vGateArea(this.value)">`+S.meta.areas.map(a=>`<option value="${esc(a)}" ${a===S.area?"selected":""}>${esc(a)}</option>`).join("")+`</select>`;
  const deptSel=`<select id="vDept" onchange="vGateCheck()"><option value="">部門を選択</option>`+S.meta.departments.map(d=>`<option value="${esc(d)}" ${d===S.dept?"selected":""}>${esc(d)}</option>`).join("")+`</select>`;
  $("app").innerHTML=
    `<div style="margin-bottom:6px"><h2 class="title">PDCA（ヒッスル）｜店舗閲覧</h2><p class="subtitle">自分の店舗・部門の数値と、やるべきこと（A/P/D）をひと目で確認</p></div>`+
    `<div class="gate-wrap"><div class="card"><div class="chead"><div class="cico">\uD83C\uDFEA</div><h3>店舗と部門を選んでください</h3>`+
    `<p class="cdesc">あなたのお店と担当部門を選ぶと、自店舗のPDCAとエリア共通の方針が見られます。</p></div>`+
    `<div class="cbody"><div class="gate-selects"><span class="lb">エリア：</span>${areaSel}<span class="lb">店舗：</span><select id="vStore" onchange="vGateCheck()"><option value="">読み込み中\u2026</option></select><span class="lb">部門：</span>${deptSel}</div>`+
    `<div style="margin-top:10px"><button class="btn primary" style="width:100%;padding:10px" id="vEnterBtn" onclick="vEnter()" disabled>\uD83D\uDD0E 自店舗のPDCAを開く</button>`+
    (restored?`<p class="hint" style="color:#166534">前回のお店・部門を復元しました。このままでよければ開いてください。</p>`:"")+
    `<p class="hint">入った後もエリア・店舗・部門は選び直せます。</p></div></div></div></div>`;
  vGateArea(S.area);
}
async function vGateArea(area){
  S.area=area;
  const sel=$("vStore"); if(sel) sel.innerHTML=`<option value="">読み込み中\u2026</option>`;
  try{ const r=await API.stores(area,S.ym,S.snap); S.stores=r.stores||[]; }catch(e){ S.stores=[]; }
  if(sel){
    const want=(loadPref_().storeSlug)||"";   // 前回の店舗を復元（同じエリアに在る場合のみ）
    sel.innerHTML=`<option value="">店舗を選択</option><option value="__area__" ${want==="__area__"?"selected":""}>エリア合計（店舗指定なし）</option><option value="__all__" ${want==="__all__"?"selected":""}>全店（各店まとめて）</option>`+S.stores.map(s=>`<option value="${esc(s.slug)}" ${s.slug===want?"selected":""}>${esc(s.short)}</option>`).join("");
  }
  vGateCheck();
}
function vGateCheck(){ const b=$("vEnterBtn"); if(b) b.disabled=!($("vStore")&&$("vStore").value&&$("vDept")&&$("vDept").value); }
function vEnter(){
  const slug=$("vStore").value, dept=$("vDept").value; if(!slug||!dept) return;
  savePref_({area:S.area,storeSlug:slug,dept:dept});   // 次回の入室で復元
  S.storeTab=slug; S.dept=dept; S.entered=true; renderViewerApp();
}
function vBackToGate(){ S.entered=false; renderViewerGate(); }

async function renderViewerApp(){
  $("page").style.background="#E1F5FE";
  const store=S.stores.find(x=>x.slug===S.storeTab);
  const areaSel=`<select onchange="vChangeArea(this.value)">`+S.meta.areas.map(a=>`<option value="${esc(a)}" ${a===S.area?"selected":""}>${esc(a)}</option>`).join("")+`</select>`;
  const storeSel=`<select id="vaStore" onchange="vChangeStore(this.value)"><option value="__area__" ${S.storeTab==="__area__"?"selected":""}>エリア合計</option><option value="__all__" ${S.storeTab==="__all__"?"selected":""}>全店（まとめて）</option>`+S.stores.map(s=>`<option value="${esc(s.slug)}" ${s.slug===S.storeTab?"selected":""}>${esc(s.short)}</option>`).join("")+`</select>`;
  const deptSel=`<select onchange="vChangeDept(this.value)">`+S.meta.departments.map(d=>`<option value="${esc(d)}" ${d===S.dept?"selected":""}>${esc(d)}</option>`).join("")+`</select>`;
  const ymSel=`<select onchange="vChangeYm(this.value)">`+S.meta.year_months.map(y=>`<option value="${esc(y)}" ${y===S.ym?"selected":""}>${esc(y.slice(0,4))}年${Number(y.slice(4))}月</option>`).join("")+`</select>`;
  $("app").innerHTML=
    `<div style="margin-bottom:6px"><h2 class="title">PDCA（ヒッスル）｜店舗閲覧</h2></div>`+
    `<div class="asgbar"><span class="chip a">${esc(S.area)}</span><span class="chip s">${esc(vScopeLabel_())}</span><span class="chip d">${esc(S.dept)}</span>`+
    `<button class="btn" style="margin-left:auto;padding:4px 10px;font-size:12px" onclick="vBackToGate()">選び直す</button></div>`+
    `<div class="selbar"><span class="lb">エリア</span>${areaSel}<span class="lb">店舗</span>${storeSel}<span class="lb">部門</span>${deptSel}<span class="lb">年月</span>${ymSel}<span class="lb">データ期間</span><select id="vSnap" onchange="vChangeSnap(this.value)"></select>`+
    `<span id="vSheetBox" style="margin-left:auto"></span></div>`+
    `<div id="printTitle"></div>`+
    `<div id="vbody"><div class="note">読み込み中\u2026</div></div>`;
  await vLoadSnaps();
  vRenderSheetBtn();
  vRenderBody();
}
async function vLoadSnaps(){
  try{ const s=await API.snapshots(S.area,S.ym); S.snaps=s.snapshots||[]; S.snap=s.default||(S.snaps[0]&&S.snaps[0].snapshot)||""; }
  catch(e){ S.snaps=[]; S.snap=""; }
  const sel=$("vSnap"); if(sel){ sel.innerHTML=S.snaps.length?S.snaps.map(o=>`<option value="${esc(o.snapshot)}">${esc(o.label)}</option>`).join(""):`<option>\u2014</option>`; if(S.snap) sel.value=S.snap; }
}
function vRenderSheetBtn(){ const b=$("vSheetBox"); if(b) b.innerHTML=`<button class="btn primary" onclick="printViewer_()" title="表示中の自店舗PDCAを印刷します（閲覧・印刷専用・書き込み不可）">🖨 印刷する</button>`; }
function nowStamp_(){ const d=new Date(),p=n=>String(n).padStart(2,"0"); return d.getFullYear()+"/"+p(d.getMonth()+1)+"/"+p(d.getDate())+" "+p(d.getHours())+":"+p(d.getMinutes()); }
function vScopeLabel_(){ if(S.storeTab==="__area__")return "エリア合計"; if(S.storeTab==="__all__")return "全店"; const s=S.stores.find(x=>x.slug===S.storeTab); return s?s.short:""; }
function printViewer_(){ const t=$("printTitle"); if(t) t.innerHTML=`<div class="ptitle">PDCA（ヒッスル） ${esc(S.area)}／${esc(vScopeLabel_())}／${esc(S.dept)}</div><div class="psub">${esc(snapLabelNow())} ／ 印刷日時 ${esc(nowStamp_())} ／ 閲覧・印刷用（書き込み不可）</div>`; window.print(); }
async function vChangeArea(a){ S.area=a; try{const r=await API.stores(a,S.ym,S.snap);S.stores=r.stores||[];}catch(e){S.stores=[];} if(!S.stores.some(s=>s.slug===S.storeTab))S.storeTab=(S.stores[0]&&S.stores[0].slug)||""; renderViewerApp(); }
async function vChangeStore(slug){ S.storeTab=slug; const chip=document.querySelector('.asgbar .chip.s'); if(chip) chip.textContent=vScopeLabel_(); await vLoadSnaps(); vRenderBody(); }
function vChangeDept(d){ S.dept=d; vRenderBody(); }
async function vChangeYm(y){ S.ym=y; try{const r=await API.stores(S.area,y,S.snap);S.stores=r.stores||[];}catch(e){} await vLoadSnaps(); vRenderBody(); }
async function vChangeSnap(v){ S.snap=v; try{const r=await API.stores(S.area,S.ym,v);S.stores=r.stores||[];}catch(e){} vRenderBody(); }

/* 読み取り専用APD（横並び・入力なし） */
function apdReadonly(cm){
  const n=Math.max(cm.A.length,cm.P.length,cm.D.length);
  let h=`<table class="cmt"><thead><tr><th style="width:26px">#</th><th>\u2705 A：改善アクション</th><th>\uD83D\uDCCB P：計画</th><th>\uD83C\uDFAF D：実行（結果）</th><th style="width:64px">済</th></tr></thead><tbody>`;
  for(let i=0;i<n;i++){ const a=cm.A[i], rs=!!(a&&a.resolved);
    h+=`<tr class="${rs?"cmresolved":""}"><td class="cmmark">${MARKS[i]||(i+1)}</td>`+
      [cm.A[i],cm.P[i],cm.D[i]].map(it=>`<td>${it?`<div class="cmtext">${esc(it.text)}</div>`:""}</td>`).join("")+
      `<td style="text-align:center">${rs?`<span class="badge bd-ok">済 ${esc(String(a.resolved_at||"").slice(5,10))}</span>`:""}</td></tr>`;
  }
  if(!n) h+=`<tr><td></td><td colspan="3" class="cmempty">（記入なし）</td><td></td></tr>`;
  return h+`</tbody></table>`;
}
async function vRenderBody(){
  const b=$("vbody"); if(!b) return; b.innerHTML=`<div class="note">読み込み中…</div>`;
  if(!S.snap){ b.innerHTML=`<div class="note">データ期間がありません。年月・エリアを変えてお試しください。</div>`; return; }
  const sp=s8(S.snap);
  const section=(head,chipCls,chipTxt,inner)=>`<div class="cmcard"><div class="chips"><span class="chip ${chipCls}">${esc(chipTxt)}</span><b>${esc(head)}</b><span class="lb">${esc(snapLabelNow())}</span></div>${inner}</div>`;
  const nodata=`<div class="note">この条件の実績データがありません。</div>`;
  const areaHtml=async()=>{ const d=await API.detail(S.area,S.ym,S.snap,S.dept).catch(e=>isNoFile(e)?null:Promise.reject(e)); const cm=await capi("getComments",S.ym,sp,S.area,"",S.dept); return section(`エリア共通（${S.area}／${S.dept}）`,"a",S.area,(d?renderSection(d):nodata)+`<div style="margin-top:10px"></div>`+apdReadonly(cm)); };
  const storeHtml=async(st)=>{ const d=await API.detailStore(S.area,S.ym,S.snap,S.dept,st.slug).catch(e=>isNoFile(e)?null:Promise.reject(e)); const cm=await capi("getComments",S.ym,sp,S.area,st.full,S.dept); return section(`自店舗・自部門（${st.short}／${S.dept}）`,"s",st.short,(d?renderSection(d):nodata)+`<div style="margin-top:10px"></div>`+apdReadonly(cm)); };
  try{
    if(S.storeTab==="__area__"){ b.innerHTML=await areaHtml(); }
    else if(S.storeTab==="__all__"){ let h=await areaHtml(); for(const st of S.stores){ h+=`<div class="page-break"></div>`+await storeHtml(st); } b.innerHTML=h||nodata; }
    else { const store=S.stores.find(x=>x.slug===S.storeTab); if(!store){ b.innerHTML=nodata; return; } b.innerHTML=(await storeHtml(store))+(await areaHtml()); }
  }catch(e){ b.innerHTML=`<div class="err">データを取得できません：${esc(String(e&&e.message||e))}</div>`; }
}

/* \u2500\u2500 スプレッドシート即時生成（GAS即時生成方式） \u2500\u2500 */
function viewerSheetSpec(){
  const a=aslug(S.area), d=dslug(S.dept), sp=s8(S.snap), store=S.stores.find(x=>x.slug===S.storeTab);
  return { fileName:`PDCA_${S.area}_${S.dept}_${store?store.short:""}_${S.ym}_${sp}`, tabs:[
    { name:`自店舗（${store?store.short:""}）`, title:`${S.area}／${store?store.short:""}／${S.dept}`, subtitle:snapLabelNow(),
      path:`c/shohin_detail__${a}__${d}__${S.ym}__${sp}__${store?store.slug:""}.json`, key:{ym:S.ym,snap8:sp,area:S.area,store:store?store.full:"",dept:S.dept} },
    { name:`エリア共通（${S.area}）`, title:`${S.area} エリア共通／${S.dept}`, subtitle:snapLabelNow(),
      path:`c/shohin_detail__${a}__${d}__${S.ym}__${sp}.json`, key:{ym:S.ym,snap8:sp,area:S.area,store:"",dept:S.dept} }
  ]};
}
function bulkSheetSpec(area,dept){
  const a=aslug(area), d=dslug(dept), sp=s8(S.snap);
  const tabs=[{ name:"エリア共通", title:`${area} エリア共通／${dept}`, subtitle:snapLabelNow(),
    path:`c/shohin_detail__${a}__${d}__${S.ym}__${sp}.json`, key:{ym:S.ym,snap8:sp,area:area,store:"",dept:dept} }];
  S.stores.forEach(st=>tabs.push({ name:st.short, title:`${area}／${st.short}／${dept}`, subtitle:snapLabelNow(),
    path:`c/shohin_detail__${a}__${d}__${S.ym}__${sp}__${st.slug}.json`, key:{ym:S.ym,snap8:sp,area:area,store:st.full,dept:dept} }));
  return { fileName:`PDCA会議_${area}_${dept}_${S.ym}_${sp}`, tabs };
}
async function openSheet(spec,btn,msgEl){
  if(btn) btn.disabled=true; const restore=btn?btn.textContent:""; if(btn) btn.textContent="生成中\u2026";
  if(msgEl) msgEl.innerHTML=`<span class="lb">スプレッドシートを生成中\u2026（数秒かかります）</span>`;
  try{ const r=await capi("buildPdcaSheet",spec);
    if(msgEl) msgEl.innerHTML=`<a class="btn primary" href="${esc(safeUrl_(r.url))}" target="_blank" rel="noopener" style="text-decoration:none">\uD83D\uDCD7 スプレッドシートを開く</a>`;
    try{ window.open(r.url,"_blank"); }catch(e){}
  }catch(e){ if(msgEl) msgEl.innerHTML=`<span class="err">生成に失敗: ${esc(String(e&&e.message||e))}</span>`; }
  finally{ if(btn){ btn.disabled=false; btn.textContent=restore; } }
}
function vOpenSheet(btn){ openSheet(viewerSheetSpec(),btn,$("vSheetMsg")); }
async function bulkOpenSheet(btn){
  if(!S.stores.length){ try{const r=await API.stores(S.area,S.ym,S.snap);S.stores=r.stores||[];}catch(e){} }
  openSheet(bulkSheetSpec(S.area,S.dept),btn,$("bulkMsg"));
}

boot();
</script>
</body>
